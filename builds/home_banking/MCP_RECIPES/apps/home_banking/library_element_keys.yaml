# Blocks requested by chrome_wrap but NOT discoverable in the tenant.
# Some are primitive widgets (not blocks); some only exist as DEPRECATED_*;
# some are non-existent under the requested name in OS UI 2.x.
missing:
  - name: AlignLeft
    reason: Not a block; primitive widget alignment handled via CSS classes / Container.HorizontalAlign.
  - name: AlignRight
    reason: Not a block; primitive widget alignment handled via CSS classes / Container.HorizontalAlign.
  - name: AlignJustify
    reason: Not a block; primitive widget alignment handled via CSS classes / Container.HorizontalAlign.
  - name: Button
    reason: Primitive widget (IButton), not a block. Use ButtonLoading for spinner/loading state.
  - name: ButtonGroup
    reason: Not present as a block in OS UI 2.x. Achieve via Container + Button widgets + CSS.
  - name: Icon
    reason: Primitive widget (IIcon / FontAwesome class) — not a block. Use IconBadge if you need an icon-with-counter block.
  - name: Heading
    reason: Not a block. Use IExpression / Text widget with heading CSS classes (h1..h6).
  - name: Header
    reason: Not a block in this tenant. Layout headers come from the Layout block in Common (per-app).
  - name: Toast
    reason: No block by that name. Closest matches captured under Notification + Alert. OS UI announcement claims Toast pattern but tenant inventory disagrees.
  - name: SimpleAlert
    reason: No block by that literal name. Alert (uuid 3f398694-7451-4ab4-ad1d-b27e38ed9490) is the closest match.

