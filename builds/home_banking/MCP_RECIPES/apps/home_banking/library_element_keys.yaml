  # --- LowCodeLibrary producer ACTIONS (not blocks) — V20 fix, 2026-06-12 ---
  # Earlier this file catalogued Blocks only (discovered via context_search
  # objects=["Blocks"]); producer ACTIONS were never collected, so Phase 0
  # imported entities-only and downstream action bodies could not call them.
  # Shape is identical to blocks ({name: elementKey}); the loader reads
  # `actions:` into the same name→ElementRef map. elementKeys are decoded from
  # known globalKeys via library_keys.compute_global_key (reversible) — verified
