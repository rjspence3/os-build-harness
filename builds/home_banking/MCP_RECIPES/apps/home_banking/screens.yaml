# =============================================================================
# Widget-tree priority queue for Phase R5b
# =============================================================================
widget_tree_probe_priority:
  P0:                          # do first; informs the biggest recipes
    - Portal/Dashboard         # dashboard pattern
    - Portal/Transfer          # form pattern
    - Portal/PersonalLoan      # wizard pattern (recipe gap)
    - Backoffice/Dashboard     # dashboard pattern (compare against Portal/Dashboard)
    - Backoffice/RequestDetail # master-detail-with-sidebar (recipe gap variant)
  P1:                          # do second; cover table + master-detail + pdf
    - Portal/Requests          # table pattern
    - Backoffice/Customers     # table pattern (compare to Portal/Requests)
    - Backoffice/CustomerDetail # master-detail pattern
    - Backoffice/PersonalLoanOfferLetter # pdf/print pattern (recipe gap)
  P2:                          # defer; minimal widget content expected
    - Portal/Confirmation      # confirmation page
    - Portal/WakeUp            # no-UI hand-off
    - Backoffice/ManageSettings # single-row form (covered by Transfer pattern)

