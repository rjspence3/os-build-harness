# Asset key: fa7ab595-f8cd-4140-8826-2acc484727b6
# Role gate (MainFlow): HomeBankingPortal
# =============================================================================
portal:
  app_key: fa7ab595-f8cd-4140-8826-2acc484727b6
  app_name: HomeBankingPortal
  uiflows:
    Common:
      - name: Login
        key: c9954689-1a97-47d4-a99a-ff2e3e29d9bc
        title_expression: "Log in"
        roles: []        # anonymous-accessible
        inputs: []
        description: Auto-generated. Do NOT re-author.

      - name: InvalidPermissions
        key: 2b4875e6-4842-4a90-bbe5-5e12808a4563
        title_expression: "Invalid permissions"
        roles: []
        inputs: []
        description: Auto-generated. Do NOT re-author.

    MainFlow:
      - name: Dashboard
        key: a63a2e8d-8afc-4a65-8000-716a854e8467
        title_expression: ""        # Mentor-default — set in widget tree
        roles: [HomeBankingPortal]
        inputs: []
        pattern_hint: dashboard
        priority: P0
        notes: |
          Highest-priority widget-tree probe. Customer-facing home screen.
          Likely renders: AccountCards (Checking, Savings, CreditCard, Loan),
          recent transactions list, AI chat floating button.

      - name: Transfer
        key: f7a07e56-0872-4b3a-9963-77e7a2b23eeb
        title_expression: ""
        roles: [HomeBankingPortal]
        inputs:
          - name: AccountId
            data_type: HBAccount Identifier
            required: true
        pattern_hint: form
        priority: P0
        notes: |
          Money-movement form. Widget tree informs recipe 06b (form screen).
          Inputs: source account, destination, amount, memo. Submits a
          Transaction record.

      - name: PersonalLoan
        key: 1ef08c49-15b1-4204-80d6-11e39ba35628
        title_expression: "Personal Loan"
        roles: [HomeBankingPortal]
        inputs:
          - name: RequestId
            data_type: LoanRequest Identifier
            required: true
          - name: StepNo
            data_type: Integer
            required: true
        pattern_hint: wizard
        priority: P0
        notes: |
          Multi-step wizard. StepNo input drives step rendering.
          Wizard pattern is a recipe gap — author a new recipe template
          (screen_wizard.md) from this widget tree.

      - name: Requests
        key: 878e661d-8185-4ba8-86a7-7e9c61543b33
        title_expression: ""
        roles: [HomeBankingPortal]
        inputs: []
        pattern_hint: table
        priority: P1
        notes: |
          List of customer's loan requests. Standard table pattern — recipe 07.

      - name: Confirmation
        key: d6e3d62c-cc36-48c8-961b-38258942c462
        title_expression: ""
        roles: [HomeBankingPortal]
        inputs:
          - name: TransactionId
            data_type: Transaction Identifier
            required: true
          - name: RequestId
            data_type: LoanRequest Identifier
            required: false
        pattern_hint: confirmation
        priority: P2
        notes: |
          Post-action success page. Typically minimal: a checkmark, a summary
          line, and a "Done" button. No new recipe needed.

      - name: WakeUp
        key: af913392-48a1-4814-8525-fb1230198ac9
        title_expression: ""
        roles: [HomeBankingPortal]
        inputs: []
        pattern_hint: intermediate
        priority: P2
        notes: |
          Likely a no-UI hand-off screen (e.g., to wake the agent backend
          before navigating to Dashboard). No widgets to probe.

